services:
  postgres:
    image: postgres:18-alpine
    container_name: turidove_vk_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-turidove_vk}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ServBay.dev}
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-turidove_vk}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - turidove_vk_net

  redis:
    image: redis:7-alpine
    container_name: turidove_vk_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - turidove_vk_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: turidove_vk_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-ServBay.dev}@postgres:5432/${POSTGRES_DB:-turidove_vk}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-to-a-long-random-string}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3003}
      UPLOADS_DIR: /app/uploads
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY:-}
      # Stripe (configurable desde .env.docker)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_REPLACE_ME}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY:-pk_test_REPLACE_ME}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_REPLACE_ME}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-usd}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://localhost:3003/reservas/{RESERVA_ID}/pago/exito}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://localhost:3003/reservas/{RESERVA_ID}/pago/cancelado}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT_INTERNAL:-6379}
    ports:
      - "3002:3001"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - turidove_vk_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3002/api/v1}
    container_name: turidove_vk_web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3002/api/v1}
    ports:
      - "3003:3000"
    networks:
      - turidove_vk_net

volumes:
  postgres_data:
    name: turidove_vk_postgres_data
  redis_data:
    name: turidove_vk_redis_data

networks:
  turidove_vk_net:
    name: turidove_vk_network
    driver: bridge
